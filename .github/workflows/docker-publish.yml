name: Docker Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: leaflet-picture-poc

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Make image public (optional)
        if: ${{ secrets.GHCR_ADMIN_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ secrets.GHCR_ADMIN_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          OWNER_TYPE=$(gh api /users/${OWNER} --jq .type)
          if [ "$OWNER_TYPE" = "Organization" ]; then
            gh api -X PATCH /orgs/${OWNER}/packages/container/${IMAGE_NAME}/visibility -f visibility=public
          else
            gh api -X PATCH /user/packages/container/${IMAGE_NAME}/visibility -f visibility=public
          fi
